<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普法情景游戏 v1.4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #game-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* 图片显示区域 */
        #visual-area {
            position: relative;
            width: 100%;
            height: 400px;
            background: #2c3e50;
            overflow: hidden;
        }

        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        #background.darken {
            opacity: 0.5;
        }

        #background.brighten {
            filter: brightness(1.3);
        }

        #background.grayscale {
            filter: grayscale(100%);
        }

        #background.blur {
            filter: blur(5px);
        }

        /* 角色层 */
        .character-layer {
            position: absolute;
            bottom: 0;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .character-layer img {
            max-height: 90%;
            object-fit: contain;
        }

        #char-left {
            left: 30%;
        }

        #char-center {
            left: 50%;
            transform: translateX(-50%);
        }

        #char-right {
            right: 30%;
        }

        /* 特效 */
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .fade-in {
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .flash {
            animation: flash 0.3s;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 文本显示区域 */
        #text-area {
            padding: 30px;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            background: white;
            border-top: 3px solid #e0e0e0;
            transition: border-color 0.3s ease;
        }

        /* 情绪边框颜色 */
        #text-area.mood-calm {
            border-top-color: #3498db;
        }

        #text-area.mood-safe {
            border-top-color: #2ecc71;
        }

        #text-area.mood-tense {
            border-top-color: #f39c12;
        }

        #text-area.mood-danger {
            border-top-color: #e74c3c;
        }

        #text-area.mood-sad {
            border-top-color: #95a5a6;
        }

        #text-area.mood-happy {
            border-top-color: #1abc9c;
        }

        #text-area.mood-hopeful {
            border-top-color: #9b59b6;
        }

        #story-content {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 20px;
        }

        #story-content p {
            margin-bottom: 15px;
        }

        /* 选项按钮 */
        #choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .choice-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .choice-button:active {
            transform: translateY(0);
        }

        /* 加载提示 */
        #loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        /* 游戏结束 */
        .game-end {
            text-align: center;
            padding: 40px;
        }

        .game-end h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        /* 滚动条样式 */
        #text-area::-webkit-scrollbar {
            width: 8px;
        }

        #text-area::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        #text-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        #text-area::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 可折叠提示框 */
        .collapsible-hint {
            margin: 15px 0;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            border: 2px solid #e0e0e0;
        }

        .hint-header {
            padding: 12px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .hint-header:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653a8b 100%);
        }

        .hint-header.tip-header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        .hint-header.legal-header {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }

        .hint-header.recap-header {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
        }

        .hint-icon {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .hint-icon.expanded {
            transform: rotate(180deg);
        }

        .hint-content {
            padding: 15px;
            background: #f9f9f9;
            display: none;
            line-height: 1.8;
        }

        .hint-content.show {
            display: block;
        }

        .hint-content ul {
            margin: 10px 0;
            padding-left: 20px;
        }

        .hint-content li {
            margin: 5px 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #visual-area {
                height: 300px;
            }

            #text-area {
                padding: 20px;
            }

            #story-content {
                font-size: 16px;
            }

            .choice-button {
                font-size: 14px;
                padding: 12px 20px;
            }
        }

        /* ===== 双栏布局 ===== */
        body {
            align-items: flex-start;
        }

        #page-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            width: 100%;
            max-width: 1260px;
            margin: 0 auto;
            padding-left: 150px;
        }

        #game-container {
            flex-shrink: 0;
        }

        /* ===== AI侧边栏 ===== */
        #ai-sidebar {
            width: 320px;
            flex-shrink: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            height: 800px;
            overflow: hidden;
            position: sticky;
            top: 20px;
        }

        #ai-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        #ai-avatar {
            font-size: 32px;
            line-height: 1;
        }

        #ai-title-group {
            display: flex;
            flex-direction: column;
        }

        #ai-name {
            font-size: 18px;
            font-weight: bold;
        }

        #ai-subtitle {
            font-size: 12px;
            opacity: 0.85;
        }

        #ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f8fc;
        }

        .ai-msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .ai-msg.assistant {
            background: white;
            border: 1px solid #e8e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .ai-msg.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-msg.typing {
            background: white;
            border: 1px solid #e8e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #999;
            font-style: italic;
        }

        #ai-input-area {
            padding: 12px;
            border-top: 1px solid #e8e8f0;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            background: white;
        }

        #ai-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        #ai-input:focus {
            border-color: #667eea;
        }

        #ai-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        #ai-send:hover {
            opacity: 0.85;
        }

        #ai-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 1100px) {
            #page-wrapper {
                flex-direction: column;
                align-items: center;
            }

            #ai-sidebar {
                width: 100%;
                max-width: 900px;
                height: 400px;
                position: static;
            }
        }

        /* Markdown 内容样式 */
        .ai-msg.assistant p { margin: 0 0 8px; }
        .ai-msg.assistant p:last-child { margin-bottom: 0; }
        .ai-msg.assistant ul, .ai-msg.assistant ol { margin: 4px 0 8px; padding-left: 18px; }
        .ai-msg.assistant li { margin: 2px 0; }
        .ai-msg.assistant strong { font-weight: 600; }
        .ai-msg.assistant h1, .ai-msg.assistant h2, .ai-msg.assistant h3 {
            font-size: 15px; font-weight: 600; margin: 8px 0 4px;
        }
        .ai-msg.assistant code {
            background: #f0f0f8; padding: 1px 5px; border-radius: 3px; font-size: 13px;
        }
        .ai-msg.assistant blockquote {
            border-left: 3px solid #ccc; margin: 6px 0; padding-left: 10px; color: #666;
        }

        #ai-messages::-webkit-scrollbar {
            width: 6px;
        }
        #ai-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #ai-messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="page-wrapper">
    <div id="game-container">
        <!-- 视觉区域（背景+角色） -->
        <div id="visual-area">
            <img id="background" src="" alt="背景" style="display: none;">
            <div id="char-left" class="character-layer" style="display: none;">
                <img src="" alt="左侧角色">
            </div>
            <div id="char-center" class="character-layer" style="display: none;">
                <img src="" alt="中央角色">
            </div>
            <div id="char-right" class="character-layer" style="display: none;">
                <img src="" alt="右侧角色">
            </div>
        </div>

        <!-- 文本区域 -->
        <div id="text-area">
            <div id="loading">正在加载游戏...</div>
            <div id="story-content" style="display: none;"></div>
            <div id="choices"></div>
        </div>
    </div>

    </div><!-- /#game-container -->

        <!-- 右栏：AI助手侧边栏 -->
        <div id="ai-sidebar">
            <div id="ai-header">
                <span id="ai-avatar">✨</span>
                <div id="ai-title-group">
                    <span id="ai-name">灵灵</span>
                    <span id="ai-subtitle">你的守护精灵</span>
                </div>
            </div>
            <div id="ai-messages"></div>
            <div id="ai-input-area">
                <textarea id="ai-input" placeholder="问灵灵任何问题..." rows="2"></textarea>
                <button id="ai-send">发送</button>
            </div>
        </div>

    </div><!-- /#page-wrapper -->

    <!-- Ink Runtime -->
    <script src="ink.js"></script>
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- 游戏逻辑 -->
    <script>
        // ============================================================
        // AI 小助手配置（如需修改角色设定，在此处编辑）
        // ============================================================
        const AI_CONFIG = {
            // 助手名字（显示在侧边栏顶部）
            name: "灵灵",

            // 头像（emoji 或图片路径，如 "graphics/characters/灵灵.png"）
            avatar: "✨",

            // 副标题
            subtitle: "你的守护精灵",

            // API Proxy (Cloudflare Worker)
            apiBase: "https://ai-api-proxy.liyuelin501.workers.dev",
            model: "Qwen/Qwen3.5-397B-A17B",

            // 角色系统提示词（修改此处调整助手的说话风格和人格）
            systemPromptBase: `你是"灵灵"，一个温暖、善良的守护精灵，专门陪伴小朋友学习法律知识和自我保护。

你的说话风格：
- 用简单、友善的语气，像一个温暖的大姐姐或大哥哥
- 解释法律时用小朋友能理解的方式，避免太多法律术语
- 遇到敏感话题时，先给予情感支持，再给出实际建议
- 鼓励小朋友勇于求助，告诉可信任的大人

当引用法律条文时：
- 必须准确标注法律名称和条款编号
- 在回答末尾用"法律依据："列出引用来源
- 只引用提供给你的条文原文，不要编造条款`
        };

        // ============================================================
        // 游戏状态（由游戏逻辑自动更新，AI 问答时自动注入上下文）
        // ============================================================
        const gameState = {
            currentBg: "",        // 当前背景场景
            currentMood: "",      // 当前情绪氛围
            silenceCount: null,      // 沉默次数
            currentAct: null,        // 当前幕数
            assaultOccurred: null,   // 是否发生侵害
            recentText: [],       // 最近3段故事文本（滚动更新）
            lastChoice: ""        // 玩家最后一次做出的选择
        };

        let story;

        // 初始化游戏
        function initGame() {
            // 加载Ink故事JSON文件
            fetch('story.json')
                .then(response => response.json())
                .then(storyContent => {
                    story = new inkjs.Story(storyContent);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('story-content').style.display = 'block';
                    continueStory();
                })
                .catch(error => {
                    document.getElementById('loading').innerHTML =
                        '加载失败！请确保story.json文件存在。<br><br>错误信息: ' + error;
                });
        }

        // 继续故事
        function continueStory() {
            let paragraphText = '';

            // 继续获取文本直到有选项或结束
            while (story.canContinue) {
                let text = story.Continue();
                paragraphText += text;

                // 处理tags
                if (story.currentTags.length > 0) {
                    processTags(story.currentTags);
                }
            }

            // 更新游戏状态供AI使用
            if (paragraphText.trim()) {
                gameState.recentText.push(paragraphText.trim().slice(0, 200));
                if (gameState.recentText.length > 3) gameState.recentText.shift();
            }
            // 尝试读取 Ink 变量
            try {
                gameState.silenceCount = story.variablesState["silence_count"];
                gameState.currentAct = story.variablesState["current_act"];
                gameState.assaultOccurred = story.variablesState["assault_occurred"];
            } catch(e) {}

            // 显示文本
            if (paragraphText.trim()) {
                displayText(paragraphText);
            }

            // 显示选项
            if (story.currentChoices.length > 0) {
                displayChoices(story.currentChoices);
            } else {
                // 游戏结束
                displayGameEnd();
            }
        }

        // 处理Tags
        function processTags(tags) {
            tags.forEach(tag => {
                const parts = tag.split(':').map(s => s.trim());
                if (parts.length !== 2) return;

                const tagName = parts[0];
                const tagValue = parts[1];

                switch (tagName) {
                    case 'bg':
                        updateBackground(tagValue);
                        break;
                    case 'char_left':
                        updateCharacter('left', tagValue);
                        break;
                    case 'char_right':
                        updateCharacter('right', tagValue);
                        break;
                    case 'char_center':
                        updateCharacter('center', tagValue);
                        break;
                    case 'mood':
                        updateMood(tagValue);
                        break;
                    case 'effect':
                        triggerEffect(tagValue);
                        break;
                    case 'bg_filter':
                        applyBackgroundFilter(tagValue);
                        break;
                }
            });
        }

        // 更新背景
        function updateBackground(filename) {
            const bg = document.getElementById('background');

            if (filename === 'none') {
                bg.style.display = 'none';
            } else {
                gameState.currentBg = filename;
                const timestamp = new Date().getTime();
                bg.src = 'graphics/background/' + filename + '?v=' + timestamp;
                bg.style.display = 'block';
                bg.classList.add('fade-in');
                setTimeout(() => bg.classList.remove('fade-in'), 1000);
            }
        }

        // 更新角色
        function updateCharacter(position, filename) {
            const container = document.getElementById('char-' + position);
            const img = container.querySelector('img');

            if (filename === 'none') {
                container.style.display = 'none';
            } else {
                // Add cache-busting timestamp
                const timestamp = new Date().getTime();
                img.src = 'graphics/characters/' + filename + '?v=' + timestamp;
                container.style.display = 'flex';
                container.classList.add('fade-in');
                setTimeout(() => container.classList.remove('fade-in'), 300);
            }
        }

        // 更新情绪氛围
        function updateMood(mood) {
            const textArea = document.getElementById('text-area');

            // 移除所有mood类
            textArea.className = textArea.className.replace(/mood-\w+/g, '');

            // 添加新mood类
            if (mood && mood !== 'none') {
                gameState.currentMood = mood;
                textArea.classList.add('mood-' + mood);
            }
        }

        // 触发特效
        function triggerEffect(effect) {
            const visualArea = document.getElementById('visual-area');

            switch (effect) {
                case 'shake':
                    visualArea.classList.add('shake');
                    setTimeout(() => visualArea.classList.remove('shake'), 500);
                    break;
                case 'flash':
                    visualArea.classList.add('flash');
                    setTimeout(() => visualArea.classList.remove('flash'), 300);
                    break;
                case 'fade':
                    const bg = document.getElementById('background');
                    bg.classList.add('fade-in');
                    setTimeout(() => bg.classList.remove('fade-in'), 1000);
                    break;
            }
        }

        // 应用背景滤镜
        function applyBackgroundFilter(filter) {
            const bg = document.getElementById('background');

            // 移除所有滤镜类
            bg.classList.remove('darken', 'brighten', 'grayscale', 'blur');

            // 应用新滤镜
            if (filter && filter !== 'none') {
                bg.classList.add(filter);
            }
        }

        // 显示文本
        function displayText(text) {
            const content = document.getElementById('story-content');

            // 将文本转换为HTML段落，处理提示框
            const paragraphs = text.split('\n').filter(p => p.trim());
            let html = '';
            let inHint = false;           // 是否在提示块中
            let hintHasSeparator = false; // 提示块是否有分隔线
            let hintType = '';
            let hintContent = '';
            let sawOpeningSeparator = false;

            paragraphs.forEach((p, index) => {
                const trimmedP = p.trim();

                // 检测分隔线
                if (trimmedP.startsWith('════')) {
                    if (inHint && hintHasSeparator && hintContent) {
                        // 这是结束分隔线，输出提示
                        html += createCollapsibleHint(hintType, hintContent);
                        inHint = false;
                        hintHasSeparator = false;
                        hintContent = '';
                        hintType = '';
                    } else {
                        // 这是开始分隔线
                        sawOpeningSeparator = true;
                    }
                    return;
                }

                // 检测 💡 开头的提示
                if (trimmedP.startsWith('💡')) {
                    // 如果之前有未输出的提示，先输出
                    if (inHint && hintContent) {
                        html += createCollapsibleHint(hintType, hintContent);
                    }

                    let hintText = trimmedP.replace('💡', '').trim();
                    hintText = hintText.replace(/^提示[：:]?\s*/, '').trim();

                    inHint = true;
                    hintType = 'tip';
                    hintHasSeparator = sawOpeningSeparator;
                    hintContent = hintText ? `<p>${hintText}</p>` : '';
                    sawOpeningSeparator = false;
                    return;
                }

                // 检测 📖 法律小课堂
                if (trimmedP.includes('📖 法律小课堂')) {
                    // 如果之前有未输出的提示，先输出
                    if (inHint && hintContent) {
                        html += createCollapsibleHint(hintType, hintContent);
                    }

                    const hintText = trimmedP.replace('📖 法律小课堂', '').replace(/[：:]\s*/, '').trim();

                    inHint = true;
                    hintType = 'legal';
                    hintHasSeparator = sawOpeningSeparator;
                    hintContent = hintText ? `<p>${hintText}</p>` : '';
                    sawOpeningSeparator = false;
                    return;
                }

                // 检测 【结局复盘】 - 现在作为普通文本处理，不做折叠
                if (trimmedP.includes('【结局复盘】')) {
                    // 如果之前有未输出的提示，先输出
                    if (inHint && hintContent) {
                        html += createCollapsibleHint(hintType, hintContent);
                        inHint = false;
                        hintContent = '';
                    }
                    // 作为标题输出
                    html += `<h3 style="color: #FF9800; margin-top: 20px;">📋 ${trimmedP}</h3>`;
                    sawOpeningSeparator = false;
                    return;
                }

                // 检测 🌟法律知识复习 - 作为普通文本处理
                if (trimmedP.includes('🌟法律知识复习')) {
                    // 如果之前有未输出的提示，先输出
                    if (inHint && hintContent) {
                        html += createCollapsibleHint(hintType, hintContent);
                        inHint = false;
                        hintContent = '';
                    }
                    // 作为标题输出
                    html += `<h3 style="color: #2196F3; margin-top: 20px;">${trimmedP}</h3>`;
                    sawOpeningSeparator = false;
                    return;
                }

                // 重置分隔线标记
                sawOpeningSeparator = false;

                // 如果在提示块内
                if (inHint) {
                    // 检查是否是bullet point或继续内容
                    if (trimmedP.startsWith('•') || trimmedP.startsWith('✓') || trimmedP.startsWith('(')) {
                        // 是bullet point，继续累积
                        hintContent += `<p>${trimmedP}</p>`;
                    } else if (!hintHasSeparator) {
                        // 无分隔线的提示，检查后面是否还有bullet points
                        // 如果下一行是bullet point，继续收集当前行
                        const nextLines = paragraphs.slice(index + 1);
                        const hasMoreBullets = nextLines.some((line, i) => {
                            const l = line.trim();
                            // 找到第一个非空行
                            if (l.startsWith('•') || l.startsWith('✓')) return true;
                            // 如果遇到新的特殊标记，停止检查
                            if (l.startsWith('💡') || l.includes('📖') || l.startsWith('════')) return false;
                            return null; // 继续检查
                        });

                        if (hasMoreBullets) {
                            // 后面还有bullet points，继续收集
                            hintContent += `<p>${trimmedP}</p>`;
                        } else {
                            // 后面没有bullet points了，输出提示并处理当前行
                            html += createCollapsibleHint(hintType, hintContent);
                            inHint = false;
                            hintContent = '';
                            html += `<p>${trimmedP}</p>`;
                        }
                    } else {
                        // 有分隔线的提示，继续累积直到遇到结束分隔线
                        hintContent += `<p>${trimmedP}</p>`;
                    }
                } else {
                    // 正常段落
                    html += `<p>${trimmedP}</p>`;
                }
            });

            // 如果还有未闭合的提示
            if (inHint && hintContent) {
                html += createCollapsibleHint(hintType, hintContent);
            }

            content.innerHTML = html;

            // 添加提示框点击事件
            document.querySelectorAll('.hint-header').forEach(header => {
                header.addEventListener('click', function() {
                    const content = this.nextElementSibling;
                    const icon = this.querySelector('.hint-icon');
                    content.classList.toggle('show');
                    icon.classList.toggle('expanded');
                });
            });

            // 滚动到顶部
            document.getElementById('text-area').scrollTop = 0;
        }

        // 创建可折叠提示框
        function createCollapsibleHint(type, content) {
            let typeClass, icon, headerText;

            switch (type) {
                case 'legal':
                    typeClass = 'legal-header';
                    icon = '📖';
                    headerText = '法律小课堂';
                    break;
                case 'recap':
                    typeClass = 'recap-header';
                    icon = '📋';
                    headerText = '结局复盘';
                    break;
                default: // 'tip'
                    typeClass = 'tip-header';
                    icon = '💡';
                    headerText = '提示';
            }

            return `
                <div class="collapsible-hint">
                    <div class="hint-header ${typeClass}">
                        <span>${icon} ${headerText}</span>
                        <span class="hint-icon">▼</span>
                    </div>
                    <div class="hint-content">
                        ${content}
                    </div>
                </div>
            `;
        }

        // 显示选项
        function displayChoices(choices) {
            const choicesContainer = document.getElementById('choices');
            choicesContainer.innerHTML = '';

            choices.forEach((choice, index) => {
                const button = document.createElement('button');
                button.className = 'choice-button';
                button.textContent = choice.text;
                button.onclick = () => {
                    gameState.lastChoice = choice.text;
                    story.ChooseChoiceIndex(index);
                    continueStory();
                };
                choicesContainer.appendChild(button);
            });
        }

        // 显示游戏结束
        function displayGameEnd() {
            const choicesContainer = document.getElementById('choices');
            choicesContainer.innerHTML = `
                <div class="game-end">
                    <h2>游戏结束</h2>
                    <p>感谢你玩这个游戏。</p>
                    <button class="choice-button" onclick="location.reload()">重新开始</button>
                </div>
            `;
        }

        // ===== 法律知识库 =====
        let legalKnowledge = [];

        async function loadLegalKnowledge() {
            try {
                const res = await fetch('legal_knowledge.json');
                legalKnowledge = await res.json();
            } catch (e) {
                console.warn("法律知识库加载失败:", e);
            }
        }

        function searchLegalKnowledge(query) {
            if (!legalKnowledge.length) return [];
            const q = query.toLowerCase();
            const scored = legalKnowledge.map(item => {
                let score = 0;
                item.keywords.forEach(kw => {
                    if (q.includes(kw)) score += 2;
                });
                if (q.includes(item.law)) score += 3;
                const words = q.split(/[\s，。？！、]/);
                words.forEach(w => {
                    if (w.length > 1 && item.content.includes(w)) score += 1;
                });
                return { item, score };
            });
            return scored
                .filter(s => s.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 3)
                .map(s => s.item);
        }

        // ===== AI 聊天 =====
        const chatHistory = [];

        function buildSystemPrompt(userQuery) {
            const relatedLaws = searchLegalKnowledge(userQuery);
            let lawContext = "";
            if (relatedLaws.length > 0) {
                lawContext = "\n\n【相关法律条文参考（请在回答中准确引用）】\n";
                relatedLaws.forEach(law => {
                    lawContext += `\n${law.law} ${law.article}：\n"${law.content}"\n`;
                });
            }

            let stateContext = "\n\n【当前游戏状态（帮助你理解玩家的处境）】\n";
            if (gameState.currentBg) stateContext += `- 当前场景：${gameState.currentBg}\n`;
            if (gameState.currentMood) stateContext += `- 当前氛围：${gameState.currentMood}\n`;
            if (gameState.currentAct !== null) stateContext += `- 当前幕数：第${gameState.currentAct}幕\n`;
            if (gameState.silenceCount !== null) stateContext += `- 沉默次数：${gameState.silenceCount}\n`;
            if (gameState.assaultOccurred !== null) stateContext += `- 是否发生侵害：${gameState.assaultOccurred ? '是' : '否'}\n`;
            if (gameState.lastChoice) stateContext += `- 玩家最近选择：${gameState.lastChoice}\n`;
            if (gameState.recentText.length > 0) {
                stateContext += `- 最近剧情片段：\n"${gameState.recentText.join('\n...\n')}"\n`;
            }

            return AI_CONFIG.systemPromptBase + lawContext + stateContext;
        }

        async function sendToAI(userMessage) {
            const sendBtn = document.getElementById('ai-send');
            const input = document.getElementById('ai-input');
            sendBtn.disabled = true;
            input.disabled = true;

            appendMessage('user', userMessage);
            const typingEl = appendMessage('typing', '灵灵正在思考...');

            const messages = [
                { role: "system", content: buildSystemPrompt(userMessage) },
                ...chatHistory,
                { role: "user", content: userMessage }
            ];

            try {
                const res = await fetch(AI_CONFIG.apiBase, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: AI_CONFIG.model,
                        messages,
                        stream: true,
                        max_tokens: 2000,
                        temperature: 0.7,
                        enable_thinking: false
                    })
                });

                if (!res.ok) {
                    throw new Error(`API 错误: ${res.status}`);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                typingEl.className = 'ai-msg assistant';
                typingEl.textContent = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

                    for (const line of lines) {
                        const data = line.slice(6);
                        if (data === '[DONE]') break;
                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices?.[0]?.delta?.content || "";
                            fullText += delta;
                            if (typeof marked !== 'undefined') {
                                typingEl.innerHTML = marked.parse(fullText);
                            } else {
                                typingEl.textContent = fullText;
                            }
                            const msgs = document.getElementById('ai-messages');
                            const atBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 60;
                            if (atBottom) msgs.scrollTop = msgs.scrollHeight;
                        } catch(e) {}
                    }
                }

                chatHistory.push({ role: "user", content: userMessage });
                chatHistory.push({ role: "assistant", content: fullText });
                if (chatHistory.length > 20) chatHistory.splice(0, 2);

            } catch (err) {
                typingEl.className = 'ai-msg assistant';
                typingEl.textContent = `出错了：${err.message}。请检查网络连接或稍后再试。`;
            }

            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }

        function appendMessage(role, text) {
            const msgs = document.getElementById('ai-messages');
            const el = document.createElement('div');
            el.className = `ai-msg ${role}`;
            if (role === 'assistant' && typeof marked !== 'undefined') {
                el.innerHTML = marked.parse(text);
            } else {
                el.textContent = text;
            }
            msgs.appendChild(el);
            // 只有用户已在底部时才自动滚动
            const atBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 60;
            if (atBottom) msgs.scrollTop = msgs.scrollHeight;
            return el;
        }

        function initAISidebar() {
            document.getElementById('ai-avatar').textContent = AI_CONFIG.avatar;
            document.getElementById('ai-name').textContent = AI_CONFIG.name;
            document.getElementById('ai-subtitle').textContent = AI_CONFIG.subtitle;

            appendMessage('assistant',
                `你好！我是${AI_CONFIG.name}，你的守护精灵 ✨\n\n在游戏过程中，你可以随时问我任何问题——关于法律、安全，或者刚才的故事情节。我会尽力帮助你！`
            );

            document.getElementById('ai-send').addEventListener('click', handleSend);
            document.getElementById('ai-input').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
        }

        function handleSend() {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            sendToAI(text);
        }

        // 页面加载时初始化游戏
        window.onload = async function() {
            await loadLegalKnowledge();
            initAISidebar();
            initGame();
        };
    </script>
</body>
